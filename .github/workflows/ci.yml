name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: WelloKit tests + type-check app
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Version de Swift
        run: swift --version

      # Logique métier pure : la couverture de tests réelle (Swift Testing → Xcode 16+).
      - name: swift test (WelloKit)
        run: swift test --package-path WelloKit

      # Reproduit la vérif hors-Xcode documentée dans CLAUDE.md : 0 erreur = app compilable.
      - name: Type-check de l'app iOS (hors Xcode)
        run: |
          set -euo pipefail
          rm -rf /tmp/wellomod && mkdir -p /tmp/wellomod
          xcrun --sdk iphonesimulator swiftc -emit-module -module-name WelloKit \
            -target arm64-apple-ios18.0-simulator \
            WelloKit/Sources/WelloKit/*.swift WelloKit/Sources/WelloKit/Models/*.swift \
            -emit-module-path /tmp/wellomod/WelloKit.swiftmodule
          xcrun --sdk iphonesimulator swiftc -typecheck -D DEBUG \
            -enable-upcoming-feature MemberImportVisibility \
            -target arm64-apple-ios18.0-simulator -I /tmp/wellomod \
            Wello/Wello/App/*.swift Wello/Wello/Models/*.swift \
            Wello/Wello/Services/*.swift Wello/Wello/Views/*.swift

  integration-tests:
    name: Tests d'intégration HydrationStore (xcodebuild)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      # Tests d'orchestration de l'app (SwiftData + mocks), cible « WelloTests » du scheme partagé
      # « Wello ». Contrairement au type-check, ceux-ci exécutent réellement le store sur simulateur.
      # Simulateur non signé (CODE_SIGNING_ALLOWED=NO) ; `-only-testing` isole la cible app.
      - name: xcodebuild test (WelloTests)
        run: |
          set -o pipefail
          # Le nom/OS exact des simulateurs varie selon l'image du runner : pin « iPhone 16,OS=latest »
          # échoue quand ce combo n'existe pas. On résout donc dynamiquement l'UDID d'un simulateur
          # iPhone disponible (iPhone 16 de préférence, sinon n'importe quel iPhone).
          UDID=$(xcrun simctl list devices available | awk -F '[()]' '/iPhone 16 /{print $2; exit}')
          if [ -z "$UDID" ]; then
            UDID=$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/{print $2; exit}')
          fi
          if [ -z "$UDID" ]; then
            echo "::error::Aucun simulateur iPhone disponible sur le runner."
            xcrun simctl list devices
            exit 1
          fi
          echo "Simulateur retenu : $UDID"
          xcodebuild test \
            -project Wello/Wello.xcodeproj \
            -scheme Wello \
            -destination "id=$UDID" \
            -only-testing:WelloTests \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO
